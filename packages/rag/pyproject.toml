[project]
name = "storyweaver-rag"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "storyweaver-core",
    "storyweaver-llm",
    "storyweaver-storage",
    "chromadb>=0.4",
    "pymupdf4llm",
    "pydantic-ai>=0.0.1",
    "docling>=2.0.0",
    "transformers>=4.40",
    "httpx>=0.27",
    "sqlalchemy>=2.0",
    "aiosqlite>=0.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag"]

[tool.uv.sources]
storyweaver-core = { workspace = true }
storyweaver-llm = { workspace = true }
storyweaver-storage = { workspace = true }