[project]
name = "storyweaver-llm"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "storyweaver-core",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["llm"]

[tool.uv.sources]
storyweaver-core = { workspace = true }