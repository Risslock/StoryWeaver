[project]
name = "storyweaver-storage"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "storyweaver-core",
    "sqlalchemy>=2.0",
    "aiosqlite>=0.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["storage"]

[tool.uv.sources]
storyweaver-core = { workspace = true }